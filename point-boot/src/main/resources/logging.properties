# java.util.logging configuration for freeway JUL provider
# This file is loaded via: -Djava.util.logging.config.file=logging.properties

# --- Handlers ---
handlers=java.util.logging.ConsoleHandler,java.util.logging.FileHandler

# --- Console ---
java.util.logging.ConsoleHandler.level=FINE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tH:%1$tM:%1$tS %4$s %3$s - %5$s%6$s%n

# --- File (logs/point.log, rotate daily) ---
java.util.logging.FileHandler.level=FINE
java.util.logging.FileHandler.pattern=logs/point.%g.log
java.util.logging.FileHandler.limit=52428800
java.util.logging.FileHandler.count=30
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.append=true

# --- Root level ---
.level=INFO

# --- Framework ---
com.jujin.freeway.level=INFO
com.jujin.freeway.boot.level=INFO
com.jujin.freeway.http.level=INFO

# --- Application ---
com.jujin.point.level=FINE
